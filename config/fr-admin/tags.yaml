# Pipeline system tags — do not rename, used internally by the classifier.
system:
  - id: "ai:processed"
    color: "#2ecc71"
  - id: "ai:to-check"
    color: "#f39c12"
  - id: "ai:failed"
    color: "#e74c3c"
  - id: "workflow:exported"
    color: "#3498db"

