services:
  filethat:
    build: .
    image: filethat:latest
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro

  filethat-ui:
    image: filethat:latest
    command: ["ui"]
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    profiles: ["ui"]
